<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>TimeThieves</title>
  <style>
    html,
    body,
    #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #inventoryPanel {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      z-index: 1000;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      transition:
        height 0.28s ease,
        transform 0.28s ease;
      pointer-events: auto;
      font-family: Verdana, Arial, sans-serif;
      background-image: url(./images/image19.png);
      background-size: cover;
      border-top-left-radius: 30px;
      border-top-right-radius: 30px;
      border-left: 6px solid #c9a961;
      border-right: 6px solid #c9a961;
      overflow: hidden;
      min-width: 280px;
      max-width: 640px;
    }

    #inventoryPanel.inventory-collapsed {
      height: 72px;
    }

    #inventoryPanel.inventory-expanded {
      height: 80vh;
    }

    .inventory-handle {
      width: 100%;
      background: transparent;
      color: #ebe0e0;
      border: none;
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      padding: 18px 20px;
      font-size: 26px;
      font-weight: 700;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      cursor: pointer;
      min-height: 72px;
      position: relative;
    }

    .inventory-handle .inventory-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      font-size: 25px;
      letter-spacing: 0.5px;
    }

    .inventory-handle span {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .inventory-content {
      color: #ffffff;
      padding: 16px 20px 20px;
      overflow-y: auto;
      max-height: calc(80vh - 72px);
    }

    #inventoryPanel.inventory-collapsed .inventory-content {
      display: none;
    }

    .inventory-header {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 16px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.9);
    }

    .inventory-items {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 8px 0;
    }

    .inventory-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
      padding: 8px;
    }

    .inventory-item:active {
      transform: scale(0.95);
      opacity: 0.8;
    }

    .inventory-item-icon {
      font-size: 48px;
      line-height: 1;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(202, 169, 97, 0.15);
      border: 2px solid rgba(201, 169, 97, 0.4);
      border-radius: 12px;
      transition:
        background 0.2s ease,
        border 0.2s ease;
    }

    .inventory-item:active .inventory-item-icon {
      background: rgba(202, 169, 97, 0.25);
      border-color: rgba(201, 169, 97, 0.6);
    }

    .inventory-item-name {
      font-size: 13px;
      text-align: center;
      color: #ffffff;
      line-height: 1.3;
      font-weight: 500;
    }

    .inventory-empty {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      padding: 24px 12px;
      text-align: center;
    }

    .inventory-monuments {
      display: grid;
      gap: 10px;
    }

    .inventory-monument-item {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(201, 169, 97, 0.3);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition:
        background 0.2s ease,
        border 0.2s ease,
        transform 0.2s ease;
      text-align: center;
      color: #ffffff;
    }

    .inventory-monument-item:active {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(201, 169, 97, 0.6);
      transform: scale(0.98);
    }

    .inventory-monument-name {
      font-weight: 600;
      font-size: 15px;
    }

    .inventory-back-button {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #ffffff;
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s ease;
    }

    .inventory-back-button:active {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.6);
    }
  </style>
</head>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script type="text/javascript"
  src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js"></script>
<script type="text/javascript" src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

<body>
  <div id="cesiumContainer"></div>
  <div id="zonePanel" style="
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 80px;
        z-index: 999;
        width: 90%;
        max-width: 640px;
        min-width: 280px;
        color: white;
        padding: 10px;
        border-radius: 8px;
        font-family: Verdana, Arial, sans-serif;
        max-height: 460px;
        overflow: auto;
        box-sizing: border-box;
      ">
    <div id="zoneMessage" style="font-size: 13px; color: #b8f5c0"></div>
  </div>

  <div id="inventoryPanel" class="inventory-collapsed" aria-hidden="false">
    <button id="inventoryToggle" class="inventory-handle" aria-expanded="false" type="button">
      <span class="inventory-title">Inventaris</span>
      <span class="inventory-count" id="inventoryCount">0</span>
    </button>
    <div class="inventory-content">
      <div id="monumentSelection" class="inventory-monuments"></div>
      <div id="inventoryView" style="display: none">
        <button class="inventory-back-button" id="inventoryBackBtn">
          ← Terug
        </button>
        <div id="inventoryItems" class="inventory-items">
          <div class="inventory-empty">Je hebt nog geen items.</div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
